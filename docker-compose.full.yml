# =============================================================================
# SignalRisk — Full Stack Docker Compose
# Brings up all 4 infrastructure services + 12 application services + dashboard
#
# Startup ordering:
#   1. Infrastructure: postgres, redis, zookeeper, kafka, neo4j
#   2. Core auth: auth-service (all other services depend on JWT validation)
#   3. Ingest layer: event-collector
#   4. Signal services: device-intel, velocity, behavioral, network-intel, telco-intel
#   5. Intelligence: rule-engine, graph-intel
#   6. Orchestration: decision-service
#   7. Operations: case-service, webhook-service
#   8. Support: feature-flag-service, outbox-relay
#
# Usage:
#   docker compose -f docker-compose.full.yml up --wait
#   docker compose -f docker-compose.full.yml down -v   # destroy volumes
# =============================================================================

name: signalrisk

# ---------------------------------------------------------------------------
# Shared environment anchors — reused across all NestJS services
# ---------------------------------------------------------------------------
x-common-env: &common-env
  NODE_ENV: development
  DATABASE_URL: postgresql://signalrisk:signalrisk_dev@postgres:5432/signalrisk
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_USER: signalrisk
  DATABASE_PASSWORD: signalrisk_dev
  DATABASE_NAME: signalrisk
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKER: kafka:9092
  # JWT — RS256 key pair (development placeholder; replace with real keys in prod)
  # The services that need RS256 will fall back to HS256/shared secret in dev mode
  JWT_SECRET: signalrisk-local-dev-secret-change-in-production
  JWT_EXPIRY: 25h
  # Feature flags
  ENABLE_JTI_DENYLIST: "true"
  ENABLE_VPN_DETECTION: "true"
  ENABLE_API_KEY_VALIDATION: "true"
  # OpenTelemetry (disabled in compose dev by default)
  OTEL_SDK_DISABLED: "true"
  LOG_LEVEL: info

# ---------------------------------------------------------------------------
# Shared service URL anchors — container-name based DNS resolution
# ---------------------------------------------------------------------------
x-service-urls: &service-urls
  AUTH_SERVICE_URL: http://auth-service:3001
  DECISION_SERVICE_URL: http://decision-service:3009
  CASE_SERVICE_URL: http://case-service:3010
  DEVICE_INTEL_SERVICE_URL: http://device-intel-service:3003
  VELOCITY_SERVICE_URL: http://velocity-service:3004
  BEHAVIORAL_SERVICE_URL: http://behavioral-service:3005
  NETWORK_INTEL_SERVICE_URL: http://network-intel-service:3006
  TELCO_INTEL_SERVICE_URL: http://telco-intel-service:3007
  RULE_ENGINE_SERVICE_URL: http://rule-engine-service:3008
  GRAPH_INTEL_SERVICE_URL: http://graph-intel-service:3012
  FEATURE_FLAG_SERVICE_URL: http://feature-flag-service:3013

# ---------------------------------------------------------------------------
# Healthcheck defaults for NestJS services (POST bootstrap ~10s)
# ---------------------------------------------------------------------------
x-app-healthcheck: &app-healthcheck
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

# ---------------------------------------------------------------------------
# depends_on condition helpers — wait for all infra to be healthy
# ---------------------------------------------------------------------------
x-depends-infra: &depends-infra
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  kafka:
    condition: service_healthy

x-depends-infra-neo4j: &depends-infra-neo4j
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  kafka:
    condition: service_healthy
  neo4j:
    condition: service_healthy

services:
  # ===========================================================================
  # INFRASTRUCTURE LAYER
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary datastore (RLS-based multi-tenant)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: signalrisk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signalrisk
      POSTGRES_PASSWORD: signalrisk_dev
      POSTGRES_DB: signalrisk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: mount init SQL scripts for schema bootstrapping
      # - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalrisk -d signalrisk"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # Redis 7 — rate limiting, jti denylist, rule weight cache, session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: signalrisk-redis
    restart: unless-stopped
    # No password in dev mode; add --requirepass <secret> for staging/prod
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # Apache Kafka (KRaft mode — no separate ZooKeeper process)
  # Single-broker dev configuration; scale brokers for production
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: signalrisk-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Dual listener: internal container-name DNS (PLAINTEXT) + host (EXTERNAL)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: "48"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      # Wait until the broker can respond to metadata requests
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # Neo4j 5 Community — graph intelligence (device-entity-merchant links)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: signalrisk-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      # Dev credentials: neo4j / password  (disable auth with NEO4J_AUTH=none)
      NEO4J_AUTH: neo4j/neo4j_dev_password
      NEO4J_PLUGINS: '[]'
      NEO4J_dbms_memory_pagecache_size: 256M
      NEO4J_dbms_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - signalrisk-network

  # ===========================================================================
  # APPLICATION LAYER — TIER 1: Core Auth
  # auth-service must be healthy before any other app service starts
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # auth-service (port 3001)
  # Handles: OAuth2 client_credentials, JWT RS256 issuance/refresh/revocation,
  # merchant onboarding, jti denylist (Redis), admin guard
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
        PORT: "3001"
    image: signalrisk/auth-service:dev
    container_name: signalrisk-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3001"
      ALLOWED_SIGNAL_HOSTS: localhost,127.0.0.1,event-collector
    depends_on: *depends-infra
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ===========================================================================
  # APPLICATION LAYER — TIER 2: Event Ingest
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # event-collector (port 3002)
  # Handles: raw event ingestion, API key validation, Kafka publish,
  # rate limiting via Redis Lua, backpressure
  # ---------------------------------------------------------------------------
  event-collector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: event-collector
        PORT: "3002"
    image: signalrisk/event-collector:dev
    container_name: signalrisk-event-collector
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3002"
      ALLOWED_SIGNAL_HOSTS: localhost,127.0.0.1
      # API key validation — comma-separated sk_test_<32hex> keys for dev
      ALLOWED_API_KEYS: "sk_test_00000000000000000000000000000001"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ===========================================================================
  # APPLICATION LAYER — TIER 3: Signal Intelligence Services
  # All depend on infra + auth-service; consume events from Kafka
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # device-intel-service (port 3003)
  # Handles: device fingerprinting, emulator detection, trust score
  # ---------------------------------------------------------------------------
  device-intel-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: device-intel-service
        PORT: "3003"
    image: signalrisk/device-intel-service:dev
    container_name: signalrisk-device-intel-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3003"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # velocity-service (port 3004)
  # Handles: sliding-window counters (Redis), velocity signals per merchant
  # ---------------------------------------------------------------------------
  velocity-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: velocity-service
        PORT: "3004"
    image: signalrisk/velocity-service:dev
    container_name: signalrisk-velocity-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3004"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # behavioral-service (port 3005)
  # Handles: session behaviour analysis, anomaly scoring
  # ---------------------------------------------------------------------------
  behavioral-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: behavioral-service
        PORT: "3005"
    image: signalrisk/behavioral-service:dev
    container_name: signalrisk-behavioral-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3005"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # network-intel-service (port 3006)
  # Handles: IP reputation, VPN/proxy detection (curated ASN list), geo data
  # ---------------------------------------------------------------------------
  network-intel-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: network-intel-service
        PORT: "3006"
    image: signalrisk/network-intel-service:dev
    container_name: signalrisk-network-intel-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3006"
      # Optional external enrichment (leave blank for dev)
      IPQS_API_KEY: ""
      MAXMIND_LICENSE_KEY: ""
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # telco-intel-service (port 3007)
  # Handles: phone number carrier lookup, SIM swap detection
  # ---------------------------------------------------------------------------
  telco-intel-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: telco-intel-service
        PORT: "3007"
    image: signalrisk/telco-intel-service:dev
    container_name: signalrisk-telco-intel-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3007"
      # Optional telco API integration (leave blank for dev)
      TELCO_API_KEY: ""
      TELCO_API_URL: ""
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3007/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ===========================================================================
  # APPLICATION LAYER — TIER 4: Rule & Graph Intelligence
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # rule-engine-service (port 3008)
  # Handles: DSL rule parsing/evaluation, rule CRUD, weight adjustment,
  # chargeback feedback loop (Redis hash rule:weight:{ruleId})
  # ---------------------------------------------------------------------------
  rule-engine-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: rule-engine-service
        PORT: "3008"
    image: signalrisk/rule-engine-service:dev
    container_name: signalrisk-rule-engine-service
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3008"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3008/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # graph-intel-service (port 3012)
  # Handles: Neo4j graph writes/queries, shared-device / shared-account links
  # ---------------------------------------------------------------------------
  graph-intel-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: graph-intel-service
        PORT: "3012"
    image: signalrisk/graph-intel-service:dev
    container_name: signalrisk-graph-intel-service
    restart: unless-stopped
    ports:
      - "3012:3012"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3012"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_dev_password
    depends_on:
      <<: *depends-infra-neo4j
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3012/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ===========================================================================
  # APPLICATION LAYER — TIER 5: Decision Orchestration
  # Requires all signal services to be healthy before accepting traffic
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # decision-service (port 3009)
  # Handles: parallel signal fan-out (AbortController 150ms), weighted scoring,
  # ALLOW/REVIEW/BLOCK outcome, idempotency, rule evaluation
  # Weights: device=0.35, velocity=0.25, behavioral=0.20, network=0.15, telco=0.05
  # ---------------------------------------------------------------------------
  decision-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: decision-service
        PORT: "3009"
    image: signalrisk/decision-service:dev
    container_name: signalrisk-decision-service
    restart: unless-stopped
    ports:
      - "3009:3009"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3009"
      # Signal weights (sum must equal 1.0)
      WEIGHT_DEVICE: "0.35"
      WEIGHT_VELOCITY: "0.25"
      WEIGHT_BEHAVIORAL: "0.20"
      WEIGHT_NETWORK: "0.15"
      WEIGHT_TELCO: "0.05"
      # Outbound signal fetch timeout (ms)
      SIGNAL_TIMEOUT_MS: "150"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
      device-intel-service:
        condition: service_healthy
      velocity-service:
        condition: service_healthy
      behavioral-service:
        condition: service_healthy
      network-intel-service:
        condition: service_healthy
      telco-intel-service:
        condition: service_healthy
      rule-engine-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3009/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ===========================================================================
  # APPLICATION LAYER — TIER 6: Operations & Case Management
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # case-service (port 3010)
  # Handles: case CRUD, SLA monitoring (5min cron), evidence timeline,
  # analyst review queue, labeling stats
  # ---------------------------------------------------------------------------
  case-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: case-service
        PORT: "3010"
    image: signalrisk/case-service:dev
    container_name: signalrisk-case-service
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3010"
      # SLA thresholds in hours: BLOCK=4h, REVIEW=24h
      SLA_BLOCK_HOURS: "4"
      SLA_REVIEW_HOURS: "24"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
      decision-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # webhook-service (port 3011)
  # Handles: HMAC-signed delivery (sha256), retry with exponential backoff,
  # dead-letter queue (Kafka DLQ topic), merchant endpoint management
  # ---------------------------------------------------------------------------
  webhook-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: webhook-service
        PORT: "3011"
    image: signalrisk/webhook-service:dev
    container_name: signalrisk-webhook-service
    restart: unless-stopped
    ports:
      - "3011:3011"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3011"
      # Webhook HMAC secret (per-merchant secrets stored in DB; this is the default)
      WEBHOOK_SIGNING_SECRET: webhook-dev-signing-secret-change-in-production
      # Retry configuration
      WEBHOOK_MAX_RETRIES: "5"
      WEBHOOK_RETRY_BACKOFF_MS: "1000"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
      decision-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3011/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ===========================================================================
  # APPLICATION LAYER — TIER 7: Support Services
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # feature-flag-service (port 3013)
  # Handles: runtime feature toggles (ENABLE_JTI_DENYLIST, ENABLE_VPN_DETECTION,
  # ENABLE_API_KEY_VALIDATION), flag CRUD, per-merchant overrides
  # ---------------------------------------------------------------------------
  feature-flag-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: feature-flag-service
        PORT: "3013"
    image: signalrisk/feature-flag-service:dev
    container_name: signalrisk-feature-flag-service
    restart: unless-stopped
    ports:
      - "3013:3013"
    environment:
      <<: [*common-env, *service-urls]
      PORT: "3013"
    depends_on: *depends-infra
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3013/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

  # ---------------------------------------------------------------------------
  # outbox-relay (health port 3014)
  # Handles: transactional outbox pattern — polls DB outbox table, publishes
  # events to Kafka, ensures at-least-once delivery
  # Note: uses HEALTH_PORT env var (not PORT) per main.ts
  # ---------------------------------------------------------------------------
  outbox-relay:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: outbox-relay
        PORT: "3014"
    image: signalrisk/outbox-relay:dev
    container_name: signalrisk-outbox-relay
    restart: unless-stopped
    ports:
      - "3014:3014"
    environment:
      <<: [*common-env, *service-urls]
      HEALTH_PORT: "3014"
      # Polling interval for outbox table (ms)
      OUTBOX_POLL_INTERVAL_MS: "500"
    depends_on:
      <<: *depends-infra
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3014/health > /dev/null 2>&1 || exit 1"]
      <<: *app-healthcheck
    networks:
      - signalrisk-network

# =============================================================================
# NAMED VOLUMES — persisted data survives container restarts
# Use `docker compose down -v` to destroy all volumes and start fresh
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

# =============================================================================
# NETWORKS — single bridge network; all containers resolve each other by name
# =============================================================================
networks:
  signalrisk-network:
    driver: bridge
    name: signalrisk-network
