# SignalRisk — Development Overrides
# Enables hot reload, source mounting, and debug ports for all NestJS services
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

x-dev-overrides: &dev-overrides
  volumes:
    - ./libs:/app/libs:cached
    - ./node_modules:/app/node_modules:cached
  environment: &dev-env
    NODE_ENV: development
    LOG_LEVEL: debug
    # Enable Node.js inspector for remote debugging
    NODE_OPTIONS: "--inspect=0.0.0.0:9229"

services:
  # ---------------------------------------------------------------------------
  # Application Services — Dev Overrides (hot reload + debug ports)
  # ---------------------------------------------------------------------------

  api-gateway:
    <<: *dev-overrides
    command: ["npx", "nest", "start", "--watch", "api-gateway"]
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src:cached
      - ./libs:/app/libs:cached
    ports:
      - "3000:3000"
      - "9200:9229"
    environment:
      <<: *dev-env
      SERVICE_NAME: api-gateway
      PORT: "3000"

  event-collector:
    <<: *dev-overrides
    command: ["npx", "nest", "start", "--watch", "event-collector"]
    volumes:
      - ./apps/event-collector/src:/app/apps/event-collector/src:cached
