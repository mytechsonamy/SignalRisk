name: FraudTester Tests

on:
  push:
    paths:
      - 'apps/fraud-tester/**'
      - '.github/workflows/fraud-tester.yml'
  pull_request:
    paths:
      - 'apps/fraud-tester/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/fraud-tester/package-lock.json
      - run: cd apps/fraud-tester && npm ci
      - run: cd apps/fraud-tester && npm test -- --coverage
        env:
          SKIP_INTEGRATION: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fraud-tester-test-results
          path: |
            apps/fraud-tester/coverage/
            apps/fraud-tester/junit.xml
          retention-days: 7
