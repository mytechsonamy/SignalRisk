name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  ORG: signalrisk

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - auth-service
          - event-collector
          - decision-service
          - device-intel-service
          - velocity-engine
          - behavioral-service
          - network-intel-service
          - telco-intel-service
          - case-service
          - webhook-service
          - graph-intel-service
          - rule-engine-service
          - feature-flag-service
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:${{ steps.tag.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:latest

  update-image-tags:
    name: Update production image tags
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update values-production.yaml
        run: |
          sed -i "s/imageTag: .*/imageTag: \"${{ steps.tag.outputs.VERSION }}\"/" \
            infrastructure/helm/signalrisk/values-production.yaml

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/helm/signalrisk/values-production.yaml
          git commit -m "chore: update production image tags to ${{ steps.tag.outputs.VERSION }}"
          git push

  sync-staging:
    name: Sync staging via ArgoCD
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ArgoCD staging sync
        run: |
          echo "ArgoCD staging sync triggered — auto-sync will pick up new images"
          echo "Monitor at: https://argocd.signalrisk.internal/applications/signalrisk-staging"
