name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - event-collector
          - device-intel-service
          - velocity-service
          - behavioral-service
          - network-intel-service
          - telco-intel-service
          - rule-engine-service
          - decision-service
          - case-service
          - webhook-service
          - graph-intel-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/${{ matrix.service }}
      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit
        working-directory: apps/${{ matrix.service }}

  test-packages:
    name: Test packages/${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - signal-contracts
          - web-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: packages/${{ matrix.package }}
      - name: Run tests
        run: npm test
        working-directory: packages/${{ matrix.package }}

  validate-infrastructure:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate K8s manifests
        run: node scripts/validate-k8s.js
      - name: Validate OpenAPI specs
        run: node scripts/validate-openapi.js

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/integration/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: tests/integration
      - name: Run integration tests
        run: npm test -- --forceExit
        working-directory: tests/integration

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install mock server dependencies
        run: cd tests/e2e/mock-server && npm ci

      - name: Install E2E test dependencies
        run: cd tests/e2e && npm ci

      - name: Install Playwright browsers
        run: cd tests/e2e && npx playwright install chromium --with-deps

      - name: Run mock server unit tests
        run: cd tests/e2e/mock-server && npx jest --no-coverage

      - name: Start mock API server
        run: cd tests/e2e/mock-server && npx ts-node server.ts &
        env:
          PORT: 5174

      - name: Wait for mock server
        run: npx wait-on http://localhost:5174/health --timeout 15000

      - name: Run Playwright E2E smoke tests
        run: cd tests/e2e && MOCK_API_URL=http://localhost:5174 npx playwright test specs/auth.spec.ts --reporter=list
        continue-on-error: true

      - name: Upload Playwright screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/e2e/test-results/

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test-services, test-packages, validate-infrastructure, test-integration]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.test-services.result }}" != "success" ] || \
             [ "${{ needs.test-packages.result }}" != "success" ] || \
             [ "${{ needs.validate-infrastructure.result }}" != "success" ] || \
             [ "${{ needs.test-integration.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All CI checks passed"
