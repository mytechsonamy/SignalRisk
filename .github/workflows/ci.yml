name: SignalRisk CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  REGISTRY: ${{ vars.ECR_REGISTRY || '123456789012.dkr.ecr.us-east-1.amazonaws.com' }}

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ESLint across the monorepo
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings 0

  # ---------------------------------------------------------------------------
  # Test — Jest unit & integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signalrisk
          POSTGRES_PASSWORD: signalrisk_test
          POSTGRES_DB: signalrisk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signalrisk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: signalrisk
      DATABASE_PASSWORD: signalrisk_test
      DATABASE_NAME: signalrisk_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --ci --coverage --forceExit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build — Docker images for every service (matrix)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - device-intel-service
          - behavioral-intel-service
          - network-intel-service
          - telco-intel-service
          - case-management-service
          - consent-service
          - erasure-service
          - webhook-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          build-args: |
            SERVICE=${{ matrix.service }}
          push: false
          tags: ${{ env.REGISTRY }}/signalrisk/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent cache from growing unbounded
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ---------------------------------------------------------------------------
  # Security Scan — Trivy vulnerability scanner
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - device-intel-service
          - behavioral-intel-service
          - network-intel-service
          - telco-intel-service
          - case-management-service
          - consent-service
          - erasure-service
          - webhook-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          build-args: |
            SERVICE=${{ matrix.service }}
          push: false
          load: true
          tags: signalrisk/${{ matrix.service }}:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: signalrisk/${{ matrix.service }}:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Run Trivy (SARIF output)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: signalrisk/${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
