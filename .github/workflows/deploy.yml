name: SignalRisk Deploy

on:
  push:
    tags:
      - "v*"

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - auth-service
          - event-collector
          - device-intel-service
          - velocity-service
          - behavioral-service
          - network-intel-service
          - telco-intel-service
          - rule-engine-service
          - decision-service
          - case-service
          - webhook-service
          - graph-intel-service
          - feature-flag-service
          - outbox-relay
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/signalrisk/${{ matrix.service }}:${{ steps.version.outputs.VERSION }}
            ${{ env.ECR_REGISTRY }}/signalrisk/${{ matrix.service }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update image tags
        run: |
          # Update Helm production values
          if [ -f infrastructure/helm/signalrisk/values-production.yaml ]; then
            sed -i "s/imageTag: .*/imageTag: \"${{ steps.version.outputs.VERSION }}\"/" \
              infrastructure/helm/signalrisk/values-production.yaml
          fi
          # Update K8s deployment manifests
          find infrastructure/k8s/services -name "deployment.yaml" \
            -exec sed -i "s|image: .*/signalrisk/\(.*\):.*|image: ${{ env.ECR_REGISTRY }}/signalrisk/\1:${{ steps.version.outputs.VERSION }}|g" {} \;

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/
          git diff --cached --quiet || git commit -m "chore: update image tags to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main
