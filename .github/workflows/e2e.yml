name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.full.yml

jobs:
  e2e-docker:
    name: E2E — Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build and start services
        run: |
          docker compose -f docker-compose.full.yml up -d --build --wait
        timeout-minutes: 15

      - name: Verify all services healthy
        run: |
          docker compose -f docker-compose.full.yml ps
          for port in 3001 3002 3003 3004 3005 3006 3007 3008 3009 3010 3011 3012 3013; do
            curl -sf http://localhost:$port/health || echo "WARNING: port $port not healthy"
          done

      - name: Run E2E tests (real services)
        run: npx playwright test --config tests/e2e/playwright.config.real.ts
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/e2e/test-results/
          retention-days: 7

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          docker compose -f docker-compose.full.yml logs > docker-logs/all.log 2>&1
        continue-on-error: true

      - name: Upload Docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs/
          retention-days: 3

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.full.yml down -v

  fraud-tester-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: cd apps/fraud-tester && npm test
        env:
          SKIP_INTEGRATION: "true"
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fraud-tester-coverage
          path: apps/fraud-tester/coverage/
          retention-days: 7
