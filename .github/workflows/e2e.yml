name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COMPOSE_FILE: docker-compose.full.yml

jobs:
  e2e:
    name: E2E — Real Services
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package.json

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Install E2E dependencies
        run: npm ci
        working-directory: tests/e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Run E2E tests (Docker skipped in CI)
        run: cd tests/e2e && npx playwright test --config=playwright.config.real.ts
        env:
          SKIP_DOCKER: "true"
        # Not: SKIP_DOCKER=true ile 28 test test.skip olur — bu beklenen davranis

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  fraud-tester-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/fraud-tester/package-lock.json
      - name: Install dependencies
        run: cd apps/fraud-tester && npm ci
      - name: Run unit tests
        run: cd apps/fraud-tester && npm test
        env:
          SKIP_INTEGRATION: "true"
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fraud-tester-coverage
          path: apps/fraud-tester/coverage/
          retention-days: 7
