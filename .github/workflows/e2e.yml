name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COMPOSE_FILE: docker-compose.full.yml

jobs:
  e2e:
    name: E2E — Real Services
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package.json

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Install E2E dependencies
        run: npm ci
        working-directory: tests/e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Start full service stack
        run: docker compose -f $COMPOSE_FILE up --wait --timeout 120
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Run E2E tests
        run: npx playwright test --config playwright.config.real.ts --workers 2
        working-directory: tests/e2e
        env:
          AUTH_URL: http://localhost:3001
          EVENT_URL: http://localhost:3002
          DECISION_URL: http://localhost:3009
          CASE_URL: http://localhost:3010
          E2E_BASE_URL: http://localhost:3002

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v
