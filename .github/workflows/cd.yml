name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - event-collector
          - device-intel-service
          - velocity-service
          - behavioral-service
          - network-intel-service
          - telco-intel-service
          - rule-engine-service
          - decision-service
          - case-service
          - webhook-service
          - graph-intel-service
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          file: ./apps/${{ matrix.service }}/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/signalrisk-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/signalrisk-${{ matrix.service }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: Update image tags in manifests
        run: |
          find infrastructure/k8s/services -name "deployment.yaml" \
            -exec sed -i "s|:latest|:${{ github.sha }}|g" {} \;
      - name: Apply K8s manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml
          kubectl apply -f infrastructure/k8s/services/ -R
          kubectl apply -f infrastructure/k8s/ingress.yaml
      - name: Wait for rollout
        run: |
          for service in auth-service event-collector decision-service; do
            kubectl rollout status deployment/$service -n signalrisk --timeout=300s
          done
