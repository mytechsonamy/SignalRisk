# SignalRisk — Local Development Docker Compose
# All infrastructure and application services for the real-time fraud detection platform

x-common-env: &common-env
  NODE_ENV: development
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_USER: ${POSTGRES_USER:-signalrisk}
  DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-signalrisk_dev}
  DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
  PGBOUNCER_HOST: pgbouncer
  PGBOUNCER_PORT: "6432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka:29092
  AUTH_SERVICE_URL: http://auth-service:3015
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-nestjs-service: &nestjs-service
  restart: unless-stopped
  networks:
    - signalrisk
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
    pgbouncer:
      condition: service_started

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: signalrisk-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalrisk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalrisk_dev}
      POSTGRES_DB: ${POSTGRES_DB:-signalrisk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalrisk} -d ${POSTGRES_DB:-signalrisk}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - signalrisk

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: signalrisk-pgbouncer
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-signalrisk}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-signalrisk_dev}
      DB_NAME: ${POSTGRES_DB:-signalrisk}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - signalrisk

  redis:
    image: redis:7-alpine
    container_name: signalrisk-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - signalrisk

  kafka:
    image: apache/kafka:3.7.0
    container_name: signalrisk-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: c2lnbmFscmlzay1sb2NhbA
      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_LOG_RETENTION_HOURS: "24"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 | grep -q 'ApiVersion'"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - signalrisk

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: signalrisk-kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: signalrisk-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - signalrisk

  # ---------------------------------------------------------------------------
  # Application Services (uses root Dockerfile with SERVICE build-arg)
  # ---------------------------------------------------------------------------

  auth-service:
    <<: *nestjs-service
    container_name: signalrisk-auth-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
        PORT: "3015"
    ports:
      - "3015:3015"
    environment:
      <<: *common-env
      SERVICE_NAME: auth-service
      PORT: "3015"
      JWT_SECRET: ${JWT_SECRET:-signalrisk-dev-jwt-secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}

  event-collector:
    <<: *nestjs-service
    container_name: signalrisk-event-collector
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: event-collector
        PORT: "3001"
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
      SERVICE_NAME: event-collector
      PORT: "3001"

  device-intel-service:
    <<: *nestjs-service
    container_name: signalrisk-device-intel-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: device-intel-service
        PORT: "3002"
    ports:
      - "3002:3002"
    environment:
      <<: *common-env
      SERVICE_NAME: device-intel-service
      PORT: "3002"

  velocity-service:
    <<: *nestjs-service
    container_name: signalrisk-velocity-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: velocity-service
        PORT: "3003"
    ports:
      - "3003:3003"
    environment:
      <<: *common-env
      SERVICE_NAME: velocity-service
      PORT: "3003"

  behavioral-service:
    <<: *nestjs-service
    container_name: signalrisk-behavioral-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: behavioral-service
        PORT: "3004"
    ports:
      - "3004:3004"
    environment:
      <<: *common-env
      SERVICE_NAME: behavioral-service
      PORT: "3004"

  network-intel-service:
    <<: *nestjs-service
    container_name: signalrisk-network-intel-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: network-intel-service
        PORT: "3005"
    ports:
      - "3005:3005"
    environment:
      <<: *common-env
      SERVICE_NAME: network-intel-service
      PORT: "3005"

  rule-engine-service:
    <<: *nestjs-service
    container_name: signalrisk-rule-engine-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: rule-engine-service
        PORT: "3006"
    ports:
      - "3006:3006"
    environment:
      <<: *common-env
      SERVICE_NAME: rule-engine-service
      PORT: "3006"

  decision-service:
    <<: *nestjs-service
    container_name: signalrisk-decision-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: decision-service
        PORT: "3007"
    ports:
      - "3007:3007"
    environment:
      <<: *common-env
      SERVICE_NAME: decision-service
      PORT: "3007"
      RULE_ENGINE_URL: http://rule-engine-service:3006
      DEVICE_INTEL_URL: http://device-intel-service:3002
      VELOCITY_ENGINE_URL: http://velocity-service:3003
      BEHAVIORAL_INTEL_URL: http://behavioral-service:3004
      NETWORK_INTEL_URL: http://network-intel-service:3005
      TELCO_INTEL_URL: http://telco-intel-service:3008

  telco-intel-service:
    <<: *nestjs-service
    container_name: signalrisk-telco-intel-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: telco-intel-service
        PORT: "3008"
    ports:
      - "3008:3008"
    environment:
      <<: *common-env
      SERVICE_NAME: telco-intel-service
      PORT: "3008"

  case-service:
    <<: *nestjs-service
    container_name: signalrisk-case-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: case-service
        PORT: "3010"
    ports:
      - "3010:3010"
    environment:
      <<: *common-env
      SERVICE_NAME: case-service
      PORT: "3010"

  webhook-service:
    <<: *nestjs-service
    container_name: signalrisk-webhook-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: webhook-service
        PORT: "3011"
    ports:
      - "3011:3011"
    environment:
      <<: *common-env
      SERVICE_NAME: webhook-service
      PORT: "3011"

  graph-intel-service:
    <<: *nestjs-service
    container_name: signalrisk-graph-intel-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: graph-intel-service
        PORT: "3012"
    ports:
      - "3012:3012"
    environment:
      <<: *common-env
      SERVICE_NAME: graph-intel-service
      PORT: "3012"

  feature-flag-service:
    <<: *nestjs-service
    container_name: signalrisk-feature-flag-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: feature-flag-service
        PORT: "3013"
    ports:
      - "3013:3013"
    environment:
      <<: *common-env
      SERVICE_NAME: feature-flag-service
      PORT: "3013"

  outbox-relay:
    <<: *nestjs-service
    container_name: signalrisk-outbox-relay
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: outbox-relay
        PORT: "3014"
    ports:
      - "3014:3014"
    environment:
      <<: *common-env
      SERVICE_NAME: outbox-relay
      PORT: "3014"

  dashboard:
    container_name: signalrisk-dashboard
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - case-service
    networks:
      - signalrisk

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local

networks:
  signalrisk:
    name: signalrisk
    driver: bridge
