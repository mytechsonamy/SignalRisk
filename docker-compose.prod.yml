    environment:
      NODE_ENV: production
      SERVICE_NAME: velocity-engine
      PORT: "3004"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
      DATABASE_USER: ${POSTGRES_USER:-signalrisk}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
