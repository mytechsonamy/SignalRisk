      DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
      DATABASE_USER: ${POSTGRES_USER:-signalrisk}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKERS: kafka:9092
      AUTH_SERVICE_URL: http://auth-service:3001
      LOG_LEVEL: info

  network-intel-service:
    <<: *app-service
    image: signalrisk/network-intel-service:latest
    build:
      context: ./apps/network-intel-service
      dockerfile: Dockerfile.prod
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      SERVICE_NAME: network-intel-service
      PORT: "3006"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
