      SERVICE_NAME: webhook-service
      PORT: "3011"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
      DATABASE_USER: ${POSTGRES_USER:-signalrisk}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKERS: kafka:9092
      AUTH_SERVICE_URL: http://auth-service:3001
      LOG_LEVEL: info

  graph-intel-service:
    <<: *app-service
    image: signalrisk/graph-intel-service:latest
    build:
      context: ./apps/graph-intel-service
