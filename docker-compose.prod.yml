version: '3.9'

# SignalRisk — Production Docker Compose
# Full production stack using pre-built images with no dev overrides.
# Secrets must be injected via environment variables or a secrets manager.

x-app-service: &app-service
  restart: always
  networks:
    - signalrisk
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

services:
  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------

  auth-service:
    <<: *app-service
    image: signalrisk/auth-service:latest
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile.prod
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      SERVICE_NAME: auth-service
      PORT: "3001"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
      DATABASE_USER: ${POSTGRES_USER:-signalrisk}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      LOG_LEVEL: info

  event-collector:
    <<: *app-service
    image: signalrisk/event-collector:latest
    build:
      context: ./apps/event-collector
      dockerfile: Dockerfile.prod
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      SERVICE_NAME: event-collector
      PORT: "3002"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
      DATABASE_USER: ${POSTGRES_USER:-signalrisk}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKERS: kafka:9092
      AUTH_SERVICE_URL: http://auth-service:3001
      LOG_LEVEL: info

  device-intel-service:
    <<: *app-service
    image: signalrisk/device-intel-service:latest
    build:
      context: ./apps/device-intel-service
      dockerfile: Dockerfile.prod
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      SERVICE_NAME: device-intel-service
      PORT: "3003"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-signalrisk}
      DATABASE_USER: ${POSTGRES_USER:-signalrisk}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
