global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "rules/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # SignalRisk Decision Engine
  - job_name: "decision-engine"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["signalrisk"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: decision-engine
        action: keep
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: "$1:3000"

  # SignalRisk Event Ingestion
  - job_name: "event-ingestion"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["signalrisk"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: event-ingestion
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: "$1:3000"

  # SignalRisk Auth Service
  - job_name: "auth-service"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["signalrisk"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: auth-service
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: "$1:3000"

  # SignalRisk Rule Engine
  - job_name: "rule-engine"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["signalrisk"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: rule-engine
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: "$1:3000"

  # Catch-all for services with prometheus.io annotations
  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["signalrisk"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: (.+):(\d+);(\d+)
        replacement: "$1:$3"
        target_label: __address__
