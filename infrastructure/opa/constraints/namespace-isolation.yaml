apiVersion: constraints.gatekeeper.sh/v1beta1
kind: SignalRiskNamespaceIsolation
metadata:
  name: signalrisk-namespace-isolation
  annotations:
    description: >-
      Prevent cross-namespace resource access between SignalRisk services.
      Each service domain (ingestion, detection, alerting, api, ml, data)
      operates in its own namespace and must not reference resources from
      other service namespaces. Shared infrastructure namespaces are exempted.
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
      - apiGroups: ["rbac.authorization.k8s.io"]
        kinds: ["RoleBinding"]
    namespaces:
      - signalrisk-ingestion
      - signalrisk-detection
      - signalrisk-alerting
      - signalrisk-api
      - signalrisk-ml
      - signalrisk-data
  parameters:
    allowedCrossNamespaceTargets:
      # Shared infrastructure namespaces that any service may reference
      - kube-system
      - signalrisk-shared
      - signalrisk-certs
      - external-secrets
