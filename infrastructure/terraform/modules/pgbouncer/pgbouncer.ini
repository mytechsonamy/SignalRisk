;; ==========================================================================
;; SignalRisk — PgBouncer Configuration
;;
;; Connection pooler for RDS PostgreSQL in transaction mode.
;; Templated by Terraform — do not edit manually.
;; ==========================================================================

[databases]
${db_name} = host=${db_host} port=${db_port} dbname=${db_name}

[pgbouncer]
;; ---- Listening ----
listen_addr = 0.0.0.0
listen_port = 5432

;; ---- Authentication ----
auth_type = md5
auth_file = /bitnami/pgbouncer/conf/userlist.txt

;; ---- Pool Mode ----
;; transaction: each transaction gets its own server connection
;; This is optimal for high-concurrency microservices workloads.
pool_mode = ${pool_mode}

;; ---- Connection Limits ----
max_client_conn   = ${max_client_conn}
default_pool_size = ${default_pool_size}
min_pool_size     = ${min_pool_size}
reserve_pool_size = ${reserve_pool_size}

;; ---- Timeouts ----
server_idle_timeout    = 600
server_lifetime        = 3600
server_connect_timeout = 15
client_idle_timeout    = 0
client_login_timeout   = 60
query_timeout          = 0
query_wait_timeout     = 120
reserve_pool_timeout   = 5

;; ---- Logging ----
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

;; ---- TLS (connect to RDS over SSL) ----
server_tls_sslmode = require

;; ---- Admin ----
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

;; ---- TCP Keepalive ----
tcp_keepalive = 1
tcp_keepidle  = 30
tcp_keepintvl = 10
tcp_keepcnt   = 3
