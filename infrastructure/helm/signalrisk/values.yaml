global:
  imageRegistry: "ghcr.io/signalrisk"
  imageTag: "latest"
  imagePullPolicy: IfNotPresent

# Per-service overrides - each service inherits these defaults
defaults:
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Service-specific config
authService:
  port: 3001
  env:
    JWT_EXPIRY: "25h"
    DB_NAME: "signalrisk_auth"

eventCollector:
  port: 3000
  env:
    KAFKA_BROKER: "kafka:9092"

decisionService:
  port: 3002
  replicaCount: 3  # Higher for critical path
  env:
    DECISION_CACHE_TTL: "5"

deviceIntelService:
  port: 3003
  env: {}

velocityEngine:
  port: 3004
  env: {}

behavioralService:
  port: 3005
  env: {}

networkIntelService:
  port: 3006
  env: {}

telcoIntelService:
  port: 3007
  env: {}

caseService:
  port: 3010
  env:
    DB_NAME: "signalrisk_cases"

webhookService:
  port: 3011
  env: {}

graphIntelService:
  port: 3012
  env:
    NEO4J_URI: "bolt://neo4j:7687"

ruleEngineService:
  port: 3008
  env: {}

featureFlagService:
  port: 3013
  env: {}
