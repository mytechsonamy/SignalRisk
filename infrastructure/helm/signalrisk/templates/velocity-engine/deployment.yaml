apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-velocity-engine
  labels:
    app: velocity-engine
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.velocityEngine.replicaCount | default .Values.defaults.replicaCount }}
  selector:
    matchLabels:
      app: velocity-engine
  template:
    metadata:
      labels:
        app: velocity-engine
    spec:
      containers:
        - name: velocity-engine
          image: "{{ .Values.global.imageRegistry }}/velocity-engine:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3004
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.defaults.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-velocity-engine-config
            - secretRef:
                name: {{ .Release.Name }}-velocity-engine-secrets
                optional: true
