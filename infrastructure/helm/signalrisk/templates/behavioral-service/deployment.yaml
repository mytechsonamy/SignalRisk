apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-behavioral-service
  labels:
    app: behavioral-service
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.behavioralService.replicaCount | default .Values.defaults.replicaCount }}
  selector:
    matchLabels:
      app: behavioral-service
  template:
    metadata:
      labels:
        app: behavioral-service
    spec:
      containers:
        - name: behavioral-service
          image: "{{ .Values.global.imageRegistry }}/behavioral-service:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3005
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.defaults.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-behavioral-service-config
            - secretRef:
                name: {{ .Release.Name }}-behavioral-service-secrets
                optional: true
