apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signalrisk-app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: signalrisk
  source:
    repoURL: https://github.com/signalrisk/signalrisk.git
    targetRevision: HEAD
    path: infrastructure/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
