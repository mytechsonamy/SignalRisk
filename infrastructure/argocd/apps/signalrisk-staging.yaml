apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signalrisk-staging
  namespace: argocd
spec:
  project: signalrisk
  source:
    repoURL: https://github.com/signalrisk/signalrisk.git
    targetRevision: main
    path: infrastructure/helm/signalrisk
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: signalrisk-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
