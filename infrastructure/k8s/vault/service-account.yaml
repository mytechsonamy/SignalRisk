# =============================================================================
# SignalRisk -- Service Accounts for Vault Authentication
# =============================================================================
# These service accounts are used by SignalRisk workloads to authenticate with
# Vault via the Kubernetes auth method. Each maps to a Vault role with specific
# policies controlling what secrets the workload can access.
# =============================================================================

# -----------------------------------------------------------------------------
# Application service account -- used by SignalRisk app pods
# Maps to Vault role: signalrisk-app (read-only secrets, dynamic DB creds)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalrisk-vault-auth
  namespace: signalrisk
  labels:
    app.kubernetes.io/name: signalrisk
    app.kubernetes.io/component: vault-auth
    app.kubernetes.io/part-of: signalrisk
  annotations:
    # Vault Agent Injector annotations for automatic sidecar injection
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "signalrisk-app"
---
# -----------------------------------------------------------------------------
# Admin service account -- used by CI/CD pipelines and migration jobs
# Maps to Vault role: signalrisk-admin (full management access)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalrisk-vault-admin
  namespace: signalrisk
  labels:
    app.kubernetes.io/name: signalrisk
    app.kubernetes.io/component: vault-admin
    app.kubernetes.io/part-of: signalrisk
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "signalrisk-admin"
---
