# PodDisruptionBudgets for all SignalRisk services
# decision-service and event-collector get minAvailable: 2 (critical path)
# all other services get minAvailable: 1
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: decision-service-pdb
  namespace: signalrisk
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: decision-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: event-collector-pdb
  namespace: signalrisk
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: event-collector
---
