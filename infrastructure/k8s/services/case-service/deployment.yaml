apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-service
  namespace: signalrisk
  labels:
    app: case-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: case-service
  template:
    metadata:
      labels:
        app: case-service
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: case-service
        image: signalrisk/case-service:latest
        ports:
        - containerPort: 3010
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: signalrisk-config
        - secretRef:
            name: signalrisk-secrets
        env:
        - name: SERVICE_NAME
          value: "case-service"
        - name: PORT
          value: "3010"
        livenessProbe:
          httpGet:
            path: /health
            port: 3010
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3010
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
