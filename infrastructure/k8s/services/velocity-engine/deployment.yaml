apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity-engine
  namespace: signalrisk
  labels:
    app: velocity-engine
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: velocity-engine
  template:
    metadata:
      labels:
        app: velocity-engine
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: velocity-engine
        image: signalrisk/velocity-engine:latest
        ports:
        - containerPort: 3004
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: signalrisk-config
        - secretRef:
            name: signalrisk-secrets
        env:
        - name: SERVICE_NAME
          value: "velocity-engine"
        - name: PORT
          value: "3004"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
