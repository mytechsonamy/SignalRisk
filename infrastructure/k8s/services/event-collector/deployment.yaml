apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-collector
  namespace: signalrisk
  labels:
    app: event-collector
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-collector
  template:
    metadata:
      labels:
        app: event-collector
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: event-collector
        image: signalrisk/event-collector:latest
        ports:
        - containerPort: 3002
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: signalrisk-config
        - secretRef:
            name: signalrisk-secrets
        env:
        - name: SERVICE_NAME
          value: "event-collector"
        - name: PORT
          value: "3002"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
