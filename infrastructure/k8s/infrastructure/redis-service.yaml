apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: signalrisk
  labels:
    app: redis
    tier: infrastructure
spec:
  type: ExternalName
  externalName: redis.signalrisk-infra.svc.cluster.local
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
# If Redis is running outside the cluster (e.g., AWS ElastiCache, Redis Cloud),
# replace externalName with the managed Redis endpoint hostname.
