apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: signalrisk
  labels:
    app: postgres
    tier: infrastructure
spec:
  type: ExternalName
  externalName: postgres.signalrisk-infra.svc.cluster.local
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
---
# If PostgreSQL is running outside the cluster (e.g., AWS RDS, Cloud SQL),
# replace externalName with the managed database hostname.
