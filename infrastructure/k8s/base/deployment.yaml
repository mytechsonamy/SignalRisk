apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: signalrisk
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: authentication
    app.kubernetes.io/part-of: signalrisk-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/component: authentication
        app.kubernetes.io/part-of: signalrisk-platform
    spec:
      serviceAccountName: auth-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          image: REGISTRY/signalrisk/auth-service:latest
          ports:
            - name: http
              containerPort: 3015
              protocol: TCP
          envFrom:
            - configMapRef:
                name: signalrisk-common-config
            - secretRef:
                name: signalrisk-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: auth-service
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: signalrisk
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: signalrisk-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  namespace: signalrisk
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: signalrisk-platform
